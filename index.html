/* Default value conversion */
function convertDefault(val, from, to) {
  if (!val) return null;
  const v = val.toUpperCase().trim();
  if (from === 'oracle') {
    if (v === 'SYSDATE' || v === 'SYSTIMESTAMP') return to === 'mysql' ? 'CURRENT_TIMESTAMP(6)' : 'CLOCK_TIMESTAMP()';
    if (v === 'SYS_GUID()') return to === 'mysql' ? 'UUID()' : 'gen_random_uuid()';
  }
  if (from === 'mysql') {
    if (v === 'CURRENT_TIMESTAMP' || v.startsWith('CURRENT_TIMESTAMP(') || v === 'NOW()' || v.startsWith('NOW(')) return to === 'oracle' ? 'SYSTIMESTAMP' : 'CLOCK_TIMESTAMP()';
    if (v === 'UUID()') return to === 'oracle' ? 'SYS_GUID()' : 'gen_random_uuid()';
    if (v === 'TRUE') return to === 'oracle' ? '1' : 'TRUE';
    if (v === 'FALSE') return to === 'oracle' ? '0' : 'FALSE';
  }
  if (from === 'postgresql') {
    if (v === 'CLOCK_TIMESTAMP()' || v === 'NOW()' || v === 'CURRENT_TIMESTAMP') return to === 'oracle' ? 'SYSTIMESTAMP' : 'CURRENT_TIMESTAMP(6)';
    if (v === 'GEN_RANDOM_UUID()') return to === 'oracle' ? 'SYS_GUID()' : 'UUID()';
    if (v === 'TRUE') return to === 'oracle' ? '1' : 'TRUE';
    if (v === 'FALSE') return to === 'oracle' ? '0' : 'FALSE';
  }
  return val;
}

/* ===== ORACLE GENERATOR ===== */
function generateOracleDDL(tables, fromDb) {
  const typeMap = fromDb === 'mysql' ? mysqlTypeToOracle : pgTypeToOracle;
  const lines = [];
  for (const tbl of tables) {
    const tname = tbl.name.toUpperCase();
    lines.push('-- ' + (tbl.comment || tname));
    lines.push('CREATE TABLE ' + tname + ' (');
    const colLines = [];
    for (const col of tbl.columns) {
      const cname = col.name.toUpperCase();
      let t = typeMap(col);
      let line = '    ' + pad(cname, 18) + ' ' + pad(t, 20);
      if (col.autoIncrement) line += ' GENERATED BY DEFAULT ON NULL AS IDENTITY';
      const dv = convertDefault(col.defaultValue, fromDb, 'oracle');
      if (dv && !col.autoIncrement) line += ' DEFAULT ' + dv;
      if (!col.nullable) line += ' NOT NULL';
      colLines.push(line);
    }
    if (tbl.primaryKey) colLines.push('    CONSTRAINT ' + tbl.primaryKey.name.toUpperCase() + ' PRIMARY KEY (' + tbl.primaryKey.columns.map(c=>c.toUpperCase()).join(', ') + ')');
    lines.push(colLines.join(',\n'));
    if (tbl.partition) {
      const partType = tbl.partition.type;
      lines.push(')');
      if (partType === 'HASH') {
        const count = tbl.partition.hashCount || tbl.partition.partitions.length || 4;
        lines.push('PARTITION BY HASH (' + tbl.partition.columns.map(c=>c.toUpperCase()).join(', ') + ') PARTITIONS ' + count + ';');
      } else if (partType === 'LIST') {
        lines.push('PARTITION BY LIST (' + tbl.partition.columns.map(c=>c.toUpperCase()).join(', ') + ') (');
        const pLines = [];
        for (const p of tbl.partition.partitions) {
          const vals = p.values ? p.values.join(',') : (p.value || '');
          pLines.push('    PARTITION ' + p.name.toUpperCase() + ' VALUES (' + vals + ')');
        }
        lines.push(pLines.join(',\n'));
        lines.push(');');
      } else {
        lines.push('PARTITION BY ' + partType + ' (' + tbl.partition.columns.map(c=>c.toUpperCase()).join(', ') + ') (');
        const pLines = [];
        for (const p of tbl.partition.partitions) {
          if (p.isDefault) { pLines.push('    PARTITION ' + p.name.toUpperCase() + ' VALUES LESS THAN (MAXVALUE)'); continue; }
          let val = p.value || '';
          if (p.valueFrom && p.valueTo) { val = "TO_DATE('" + p.valueTo + "', 'YYYY-MM-DD')"; }
          else if (/^TO_DAYS\(/i.test(val)) { const dm = val.match(/TO_DAYS\s*\(\s*'([^']*)'\s*\)/i); val = dm ? "TO_DATE('" + dm[1] + "', 'YYYY-MM-DD')" : val; }
          else if (val.toUpperCase() === 'MAXVALUE' || val === '') { val = 'MAXVALUE'; }
          pLines.push('    PARTITION ' + p.name.toUpperCase() + ' VALUES LESS THAN (' + val + ')');
        }
        lines.push(pLines.join(',\n'));
        lines.push(');');
      }
    } else { lines.push(');'); }
    lines.push('');
    if (tbl.comment) lines.push("COMMENT ON TABLE " + tname + " IS '" + tbl.comment.replace(/'/g, "''") + "';");
    for (const col of tbl.columns) { if (col.comment) lines.push("COMMENT ON COLUMN " + tname + "." + col.name.toUpperCase() + " IS '" + col.comment.replace(/'/g, "''") + "';"); }
    if (tbl.columns.some(c=>c.comment) || tbl.comment) lines.push('');
    for (const uk of tbl.uniqueKeys) lines.push('CREATE UNIQUE INDEX ' + uk.name.toUpperCase() + ' ON ' + tname + '(' + uk.columns.map(c=>c.toUpperCase()).join(', ') + ');');
    for (const idx of tbl.indexes) lines.push('CREATE INDEX ' + idx.name.toUpperCase() + ' ON ' + tname + '(' + idx.columns.map(c=>c.toUpperCase()).join(', ') + ');');
    if (tbl.uniqueKeys.length || tbl.indexes.length) lines.push('');
    for (const fk of tbl.foreignKeys) {
      let fkLine = 'ALTER TABLE ' + tname + ' ADD CONSTRAINT ' + fk.name.toUpperCase() + ' FOREIGN KEY (' + fk.columns.map(c=>c.toUpperCase()).join(', ') + ') REFERENCES ' + fk.refTable.toUpperCase() + '(' + fk.refColumns.map(c=>c.toUpperCase()).join(', ') + ')';
      if (fk.onDelete) fkLine += ' ON DELETE ' + fk.onDelete.toUpperCase();
      if (fk.onUpdate) fkLine += ' ON UPDATE ' + fk.onUpdate.toUpperCase();
      lines.push(fkLine + ';');
    }
    if (tbl.foreignKeys.length) lines.push('');
  }
  return lines.join('\n').trim();
}

/* ===== MYSQL GENERATOR ===== */
function generateMySQLDDL(tables, fromDb) {
  const typeMap = fromDb === 'oracle' ? oracleTypeToMySQL : pgTypeToMySQL;
  const lines = [];
  for (const tbl of tables) {
    const tname = tbl.name.toLowerCase();
    lines.push('-- ' + (tbl.comment || tname));
    lines.push('CREATE TABLE `' + tname + '` (');
    const colLines = [];
    for (const col of tbl.columns) {
      const cname = col.name.toLowerCase();
      let t = typeMap(col);
      let line = '    `' + cname + '`' + ' '.repeat(Math.max(1, 18 - cname.length)) + pad(t, 20);
      const dv = convertDefault(col.defaultValue, fromDb, 'mysql');
      if (dv) line += ' DEFAULT ' + dv;
      if (col.autoIncrement) line += ' AUTO_INCREMENT';
      if (!col.nullable) line += ' NOT NULL';
      if (col.comment) line += " COMMENT '" + col.comment.replace(/'/g, "''") + "'";
      colLines.push(line);
    }
    if (tbl.primaryKey) colLines.push('    PRIMARY KEY (' + tbl.primaryKey.columns.map(c=>'`'+c.toLowerCase()+'`').join(', ') + ')');
    for (const uk of tbl.uniqueKeys) colLines.push('    UNIQUE KEY `' + uk.name.toLowerCase() + '` (' + uk.columns.map(c=>'`'+c.toLowerCase()+'`').join(', ') + ')');
    for (const idx of tbl.indexes) colLines.push('    KEY `' + idx.name.toLowerCase() + '` (' + idx.columns.map(c=>'`'+c.toLowerCase()+'`').join(', ') + ')');
    for (const fk of tbl.foreignKeys) {
      let fkLine = '    CONSTRAINT `' + fk.name.toLowerCase() + '` FOREIGN KEY (' + fk.columns.map(c=>'`'+c.toLowerCase()+'`').join(', ') + ') REFERENCES `' + fk.refTable.toLowerCase() + '`(' + fk.refColumns.map(c=>'`'+c.toLowerCase()+'`').join(', ') + ')';
      if (fk.onDelete) fkLine += ' ON DELETE ' + fk.onDelete.toUpperCase();
      if (fk.onUpdate) fkLine += ' ON UPDATE ' + fk.onUpdate.toUpperCase();
      colLines.push(fkLine);
    }
    lines.push(colLines.join(',\n'));
    let optLine = ') ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci';
    if (tbl.comment) optLine += "\n  COMMENT='" + tbl.comment.replace(/'/g, "''") + "'";
    if (tbl.partition) {
      lines.push(optLine);
      const pType = tbl.partition.type;
      const pCols = tbl.partition.columns.map(c=>'`'+c.toLowerCase()+'`').join(', ');
      if (pType === 'HASH') {
        const count = tbl.partition.hashCount || tbl.partition.partitions.length || 4;
        lines.push('  PARTITION BY HASH (' + pCols + ')');
        lines.push('  PARTITIONS ' + count + ';');
      } else if (pType === 'LIST') {
        lines.push('  PARTITION BY LIST COLUMNS(' + pCols + ') (');
        const pLines = [];
        for (const p of tbl.partition.partitions) { const vals = p.values ? p.values.join(',') : (p.value || ''); pLines.push('    PARTITION `' + p.name.toLowerCase() + '` VALUES IN (' + vals + ')'); }
        lines.push(pLines.join(',\n'));
        lines.push('  );');
      } else if (pType === 'RANGE') {
        const isDate = tbl.columns.some(c => tbl.partition.columns.some(pc => pc.toUpperCase() === c.name.toUpperCase()) && /DATE|DATETIME|TIMESTAMP/i.test(typeMap(c)));
        if (isDate) lines.push('  PARTITION BY RANGE (TO_DAYS(' + pCols + ')) (');
        else lines.push('  PARTITION BY RANGE (' + pCols + ') (');
        const pLines = [];
        for (const p of tbl.partition.partitions) {
          if (p.isDefault) { pLines.push('    PARTITION `' + p.name.toLowerCase() + '` VALUES LESS THAN MAXVALUE'); continue; }
          let val = p.value || '';
          if (p.valueFrom && p.valueTo) { val = "TO_DAYS('" + p.valueTo + "')"; }
          else if (/TO_DATE\s*\(\s*'([^']*)'/i.test(val)) { const dm = val.match(/TO_DATE\s*\(\s*'([^']*)'/i); val = "TO_DAYS('" + dm[1] + "')"; }
          else if (val.toUpperCase() === 'MAXVALUE') { val = 'MAXVALUE'; }
          if (val === 'MAXVALUE') pLines.push('    PARTITION `' + p.name.toLowerCase() + '` VALUES LESS THAN MAXVALUE');
          else pLines.push('    PARTITION `' + p.name.toLowerCase() + '` VALUES LESS THAN (' + val + ')');
        }
        lines.push(pLines.join(',\n'));
        lines.push('  );');
      }
    } else { lines.push(optLine + ';'); }
    lines.push('');
  }
  return lines.join('\n').trim();
}

/* ===== POSTGRESQL GENERATOR ===== */
function generatePostgreSQLDDL(tables, fromDb) {
  const typeMap = fromDb === 'oracle' ? oracleTypeToPG : mysqlTypeToPG;
  const lines = [];
  for (const tbl of tables) {
    const tname = tbl.name.toLowerCase();
    lines.push('-- ' + (tbl.comment || tname));
    lines.push('CREATE TABLE ' + tname + ' (');
    const colLines = [];
    for (const col of tbl.columns) {
      const cname = col.name.toLowerCase();
      let t;
      if (col.autoIncrement) {
        const baseT = typeMap(col);
        if (/BIGINT/i.test(baseT) || /NUMBER\(18\)/i.test(col.rawType) || col.type === 'BIGSERIAL') t = 'BIGSERIAL';
        else if (/SMALLINT/i.test(baseT)) t = 'SMALLSERIAL';
        else t = 'SERIAL';
      } else { t = typeMap(col); }
      let line = '    ' + pad(cname, 18) + ' ' + pad(t, 20);
      if (!col.autoIncrement) { const dv = convertDefault(col.defaultValue, fromDb, 'postgresql'); if (dv) line += ' DEFAULT ' + dv; }
      if (!col.nullable) line += ' NOT NULL';
      colLines.push(line);
    }
    if (tbl.primaryKey) colLines.push('    CONSTRAINT ' + tbl.primaryKey.name.toLowerCase() + ' PRIMARY KEY (' + tbl.primaryKey.columns.map(c=>c.toLowerCase()).join(', ') + ')');
    lines.push(colLines.join(',\n'));
    if (tbl.partition) {
      const partType = tbl.partition.type;
      lines.push(') PARTITION BY ' + partType + ' (' + tbl.partition.columns.map(c=>c.toLowerCase()).join(', ') + ');');
      lines.push('');
      if (partType === 'HASH') {
        const count = tbl.partition.hashCount || tbl.partition.partitions.length || 4;
        for (let i = 0; i < count; i++) {
          const pName = tbl.partition.partitions[i] ? tbl.partition.partitions[i].name.toLowerCase() : tname + '_p' + i;
          lines.push('CREATE TABLE ' + pName + ' PARTITION OF ' + tname);
          lines.push('    FOR VALUES WITH (modulus ' + count + ', remainder ' + i + ');');
        }
        lines.push('');
      } else if (partType === 'LIST') {
        for (const p of tbl.partition.partitions) {
          if (p.isDefault) { lines.push('CREATE TABLE ' + tname + '_' + p.name.toLowerCase() + ' PARTITION OF ' + tname + ' DEFAULT;'); continue; }
          const vals = p.values ? p.values.join(',') : (p.value || '');
          lines.push('CREATE TABLE ' + tname + '_' + p.name.toLowerCase() + ' PARTITION OF ' + tname);
          lines.push('    FOR VALUES IN (' + vals + ');');
        }
        lines.push('');
      } else {
        const rangePartitions = [];
        for (const p of tbl.partition.partitions) {
          if (p.isDefault) { rangePartitions.push({ name: p.name, isDefault: true }); continue; }
          if (p.valueFrom && p.valueTo) { rangePartitions.push({ name: p.name, from: p.valueFrom, to: p.valueTo }); continue; }
          const val = (p.value || '').trim();
          if (val.toUpperCase() === 'MAXVALUE') { rangePartitions.push({ name: p.name, isDefault: true }); continue; }
          const dm = val.match(/TO_DATE\s*\(\s*'([^']*)'/i) || val.match(/TO_DAYS\s*\(\s*'([^']*)'/i);
          let valTo = dm ? dm[1] : val;
          rangePartitions.push({ name: p.name, to: valTo });
        }
        let prevTo = null;
        for (const rp of rangePartitions) {
          if (rp.isDefault) { lines.push('CREATE TABLE ' + tname + '_' + rp.name.toLowerCase() + ' PARTITION OF ' + tname + ' DEFAULT;'); continue; }
          if (rp.from && rp.to) {
            lines.push('CREATE TABLE ' + tname + '_' + rp.name.toLowerCase() + ' PARTITION OF ' + tname);
            lines.push("    FOR VALUES FROM ('" + rp.from + "') TO ('" + rp.to + "');");
            prevTo = rp.to;
          } else if (rp.to) {
            lines.push('CREATE TABLE ' + tname + '_' + rp.name.toLowerCase() + ' PARTITION OF ' + tname);
            if (prevTo) lines.push("    FOR VALUES FROM ('" + prevTo + "') TO ('" + rp.to + "');");
            else lines.push("    FOR VALUES FROM (MINVALUE) TO ('" + rp.to + "');");
            prevTo = rp.to;
          }
        }
        lines.push('');
      }
    } else { lines.push(');'); lines.push(''); }
    if (tbl.comment) lines.push("COMMENT ON TABLE " + tname + " IS '" + tbl.comment.replace(/'/g, "''") + "';");
    for (const col of tbl.columns) { if (col.comment) lines.push("COMMENT ON COLUMN " + tname + "." + col.name.toLowerCase() + " IS '" + col.comment.replace(/'/g, "''") + "';"); }
    if (tbl.columns.some(c=>c.comment) || tbl.comment) lines.push('');
    for (const uk of tbl.uniqueKeys) lines.push('CREATE UNIQUE INDEX ' + uk.name.toLowerCase() + ' ON ' + tname + '(' + uk.columns.map(c=>c.toLowerCase()).join(', ') + ');');
    for (const idx of tbl.indexes) lines.push('CREATE INDEX ' + idx.name.toLowerCase() + ' ON ' + tname + '(' + idx.columns.map(c=>c.toLowerCase()).join(', ') + ');');
    if (tbl.uniqueKeys.length || tbl.indexes.length) lines.push('');
    for (const fk of tbl.foreignKeys) {
      let fkLine = 'ALTER TABLE ' + tname + ' ADD CONSTRAINT ' + fk.name.toLowerCase() + ' FOREIGN KEY (' + fk.columns.map(c=>c.toLowerCase()).join(', ') + ') REFERENCES ' + fk.refTable.toLowerCase() + '(' + fk.refColumns.map(c=>c.toLowerCase()).join(', ') + ')';
      if (fk.onDelete) fkLine += ' ON DELETE ' + fk.onDelete.toUpperCase();
      if (fk.onUpdate) fkLine += ' ON UPDATE ' + fk.onUpdate.toUpperCase();
      lines.push(fkLine + ';');
    }
    if (tbl.foreignKeys.length) lines.push('');
  }
  return lines.join('\n').trim();
}

/* ===== MAIN CONVERT ===== */
function convertDDL(input, sourceDb, targetDb) {
  if (!input.trim()) return '-- 请输入 DDL 语句';
  if (input.length > 500000) return '-- 输入内容过大（超过500KB），请分批处理';
  if (sourceDb === targetDb) return '-- 源数据库与目标数据库相同，无需转换';
  let tables;
  try {
    if (sourceDb === 'oracle') tables = parseOracleDDL(input);
    else if (sourceDb === 'mysql') tables = parseMySQLDDL(input);
    else if (sourceDb === 'postgresql') tables = parsePostgreSQLDDL(input);
    else return '-- 不支持的源数据库: ' + sourceDb;
  } catch (e) { return '-- 解析失败: ' + e.message + '\n-- 请检查输入的 DDL 语法是否正确'; }
  if (!tables || !tables.length) return '-- 未识别到 CREATE TABLE 语句，请检查输入格式';
  let output;
  try {
    if (targetDb === 'oracle') output = generateOracleDDL(tables, sourceDb);
    else if (targetDb === 'mysql') output = generateMySQLDDL(tables, sourceDb);
    else if (targetDb === 'postgresql') output = generatePostgreSQLDDL(tables, sourceDb);
    else return '-- 不支持的目标数据库: ' + targetDb;
  } catch (e) { return '-- 生成失败: ' + e.message; }
  const header = '-- ============================================================\n'
    + '-- 自动生成: ' + DB_LABELS[sourceDb] + ' → ' + DB_LABELS[targetDb] + '\n'
    + '-- 表数量: ' + tables.length + '\n'
    + '-- 生成时间: ' + new Date().toISOString().slice(0,19).replace('T',' ') + '\n'
    + '-- 请检查类型映射和分区语法是否符合目标库版本要求\n'
    + '-- ============================================================\n\n';
  return header + output;
}

/* ===== SHARED UTILITIES FOR FUNCTION & PROCEDURE ENGINES ===== */

function mapParamType(typeStr, fromDb, toDb) {
  if (!typeStr) return typeStr;
  let t = typeStr.trim();
  if (fromDb === toDb) return t;

  if (fromDb === 'oracle') {
    if (toDb === 'mysql') {
      t = t.replace(/\bNUMBER\s*\(\s*(\d+)\s*,\s*(\d+)\s*\)/gi, 'DECIMAL($1,$2)');
      t = t.replace(/\bNUMBER\s*\(\s*(\d+)\s*\)/gi, 'BIGINT');
      t = t.replace(/\bNUMBER\b/gi, 'BIGINT');
      t = t.replace(/\bVARCHAR2\s*\(([^)]+)\)/gi, 'VARCHAR($1)');
      t = t.replace(/\bVARCHAR2\b/gi, 'VARCHAR(4000)');
      t = t.replace(/\bNVARCHAR2\s*\(([^)]+)\)/gi, 'VARCHAR($1)');
      t = t.replace(/\bCLOB\b/gi, 'LONGTEXT');
      t = t.replace(/\bBLOB\b/gi, 'LONGBLOB');
      t = t.replace(/\bDATE\b/gi, 'DATETIME');
      t = t.replace(/\bTIMESTAMP\b/gi, 'DATETIME(6)');
      t = t.replace(/\bPLS_INTEGER\b/gi, 'INT');
      t = t.replace(/\bBINARY_INTEGER\b/gi, 'INT');
      t = t.replace(/\bBOOLEAN\b/gi, 'TINYINT(1)');
      t = t.replace(/\bINTEGER\b/gi, 'INT');
      t = t.replace(/\bREAL\b/gi, 'DOUBLE');
    } else if (toDb === 'postgresql') {
      t = t.replace(/\bNUMBER\s*\(\s*(\d+)\s*,\s*(\d+)\s*\)/gi, 'NUMERIC($1,$2)');
      t = t.replace(/\bNUMBER\s*\(\s*(\d+)\s*\)/gi, 'BIGINT');
      t = t.replace(/\bNUMBER\b/gi, 'BIGINT');
      t = t.replace(/\bVARCHAR2\s*\(([^)]+)\)/gi, 'VARCHAR($1)');
      t = t.replace(/\bVARCHAR2\b/gi, 'VARCHAR');
      t = t.replace(/\bNVARCHAR2\s*\(([^)]+)\)/gi, 'VARCHAR($1)');
      t = t.replace(/\bCLOB\b/gi, 'TEXT');
      t = t.replace(/\bBLOB\b/gi, 'BYTEA');
      t = t.replace(/\bDATE\b/gi, 'TIMESTAMP');
      t = t.replace(/\bTIMESTAMP\b/gi, 'TIMESTAMP');
      t = t.replace(/\bPLS_INTEGER\b/gi, 'INTEGER');
      t = t.replace(/\bBINARY_INTEGER\b/gi, 'INTEGER');
      t = t.replace(/\bBOOLEAN\b/gi, 'BOOLEAN');
      t = t.replace(/\bREAL\b/gi, 'DOUBLE PRECISION');
    }
  }

  if (fromDb === 'mysql') {
    if (toDb === 'oracle') {
      t = t.replace(/\bDECIMAL\s*\(\s*(\d+)\s*,\s*(\d+)\s*\)/gi, 'NUMBER($1,$2)');
      t = t.replace(/\bBIGINT\b/gi, 'NUMBER(19)');
      t = t.replace(/\bTINYINT\s*\(\s*1\s*\)/gi, 'NUMBER(1)');
      t = t.replace(/\bTINYINT\b/gi, 'NUMBER(3)');
      t = t.replace(/\bSMALLINT\b/gi, 'NUMBER(5)');
      t = t.replace(/\bINT\b/gi, 'NUMBER(10)');
      t = t.replace(/\bDOUBLE\b/gi, 'NUMBER');
      t = t.replace(/\bFLOAT\b/gi, 'NUMBER');
      t = t.replace(/\bLONGTEXT\b/gi, 'CLOB');
      t = t.replace(/\bMEDIUMTEXT\b/gi, 'CLOB');
      t = t.replace(/\bTEXT\b/gi, 'CLOB');
      t = t.replace(/\bLONGBLOB\b/gi, 'BLOB');
      t = t.replace(/\bDATETIME\s*\(\s*\d+\s*\)/gi, 'TIMESTAMP');
      t = t.replace(/\bDATETIME\b/gi, 'DATE');
      t = t.replace(/\bBOOLEAN\b/gi, 'NUMBER(1)');
    } else if (toDb === 'postgresql') {
      t = t.replace(/\bDECIMAL\s*\(\s*(\d+)\s*,\s*(\d+)\s*\)/gi, 'NUMERIC($1,$2)');
      t = t.replace(/\bTINYINT\s*\(\s*1\s*\)/gi, 'BOOLEAN');
      t = t.replace(/\bTINYINT\b/gi, 'SMALLINT');
      t = t.replace(/\bINT\b/gi, 'INTEGER');
      t = t.replace(/\bDOUBLE\b/gi, 'DOUBLE PRECISION');
      t = t.replace(/\bLONGTEXT\b/gi, 'TEXT');
      t = t.replace(/\bMEDIUMTEXT\b/gi, 'TEXT');
      t = t.replace(/\bLONGBLOB\b/gi, 'BYTEA');
      t = t.replace(/\bDATETIME\s*\(\s*\d+\s*\)/gi, 'TIMESTAMP');
      t = t.replace(/\bDATETIME\b/gi, 'TIMESTAMP');
    }
  }

  if (fromDb === 'postgresql') {
    if (toDb === 'oracle') {
      t = t.replace(/\bNUMERIC\s*\(\s*(\d+)\s*,\s*(\d+)\s*\)/gi, 'NUMBER($1,$2)');
      t = t.replace(/\bNUMERIC\b/gi, 'NUMBER');
      t = t.replace(/\bBIGINT\b/gi, 'NUMBER(19)');
      t = t.replace(/\bINTEGER\b/gi, 'NUMBER(10)');
      t = t.replace(/\bSMALLINT\b/gi, 'NUMBER(5)');
      t = t.replace(/\bSERIAL\b/gi, 'NUMBER');
      t = t.replace(/\bBIGSERIAL\b/gi, 'NUMBER');
      t = t.replace(/\bTEXT\b/gi, 'CLOB');
      t = t.replace(/\bBYTEA\b/gi, 'BLOB');
      t = t.replace(/\bBOOLEAN\b/gi, 'NUMBER(1)');
      t = t.replace(/\bDOUBLE PRECISION\b/gi, 'NUMBER');
      t = t.replace(/\bVARCHAR\b(?!\s*\()/gi, 'VARCHAR2(4000)');
      t = t.replace(/\bVARCHAR\s*\(([^)]+)\)/gi, 'VARCHAR2($1)');
    } else if (toDb === 'mysql') {
      t = t.replace(/\bNUMERIC\s*\(\s*(\d+)\s*,\s*(\d+)\s*\)/gi, 'DECIMAL($1,$2)');
      t = t.replace(/\bNUMERIC\b/gi, 'DECIMAL');
      t = t.replace(/\bINTEGER\b/gi, 'INT');
      t = t.replace(/\bSERIAL\b/gi, 'INT AUTO_INCREMENT');
      t = t.replace(/\bBIGSERIAL\b/gi, 'BIGINT AUTO_INCREMENT');
      t = t.replace(/\bTEXT\b/gi, 'LONGTEXT');
      t = t.replace(/\bBYTEA\b/gi, 'LONGBLOB');
      t = t.replace(/\bTIMESTAMP\b/gi, 'DATETIME');
      t = t.replace(/\bBOOLEAN\b/gi, 'TINYINT(1)');
      t = t.replace(/\bDOUBLE PRECISION\b/gi, 'DOUBLE');
    }
  }

  return t;
}

function _splitArgs(str) {
  var result = [], depth = 0, current = '';
  for (var i = 0; i < str.length; i++) {
    var ch = str[i];
    if (ch === '(') { depth++; current += ch; }
    else if (ch === ')') { depth--; current += ch; }
    else if (ch === ',' && depth === 0) { result.push(current); current = ''; }
    else { current += ch; }
  }
  if (current.trim()) result.push(current);
  return result;
}

function _splitParamList(paramStr) {
  return _splitArgs(paramStr).map(function(p) { return p.trim(); }).filter(function(p) { return p.length > 0; });
}

function _convertConcatToFunction(line) {
  if (!line.includes('||')) return line;
  var parts = [], current = '', inSingle = false, i = 0;
  while (i < line.length) {
    if (line[i] === "'" && (i === 0 || line[i - 1] !== '\\')) {
      inSingle = !inSingle; current += line[i]; i++;
    } else if (!inSingle && line[i] === '|' && i + 1 < line.length && line[i + 1] === '|') {
      parts.push(current.trim()); current = ''; i += 2;
    } else { current += line[i]; i++; }
  }
  if (current.trim()) parts.push(current.trim());
  if (parts.length <= 1) return line;
  var leading = line.match(/^(\s*)/)[1];
  return leading + 'CONCAT(' + parts.join(', ') + ')';
}

function transformBody(body, fromDb, toDb) {
  if (!body || fromDb === toDb) return body;
  var b = body;

  // DECODE -> CASE (Oracle source)
  if (fromDb === 'oracle') {
    b = b.replace(/\bDECODE\s*\(([^()]*(?:\([^()]*\)[^()]*)*)\)/gi, function(match, inner) {
      var args = _splitArgs(inner);
      if (args.length < 3) return match;
      var expr = args[0].trim();
      var result = 'CASE ' + expr;
      var i = 1;
      while (i + 1 < args.length) {
        if (i + 2 === args.length) {
          result += ' WHEN ' + args[i].trim() + ' THEN ' + args[i + 1].trim();
          i += 2;
        } else {
          result += ' WHEN ' + args[i].trim() + ' THEN ' + args[i + 1].trim();
          i += 2;
        }
      }
      if (i < args.length) result += ' ELSE ' + args[i].trim();
      result += ' END';
      return result;
    });
  }

  // NVL / IFNULL / COALESCE
  if (fromDb === 'oracle') {
    if (toDb === 'mysql') b = b.replace(/\bNVL\s*\(/gi, 'IFNULL(');
    else if (toDb === 'postgresql') b = b.replace(/\bNVL\s*\(/gi, 'COALESCE(');
  } else if (fromDb === 'mysql') {
    if (toDb === 'oracle') b = b.replace(/\bIFNULL\s*\(/gi, 'NVL(');
    else if (toDb === 'postgresql') b = b.replace(/\bIFNULL\s*\(/gi, 'COALESCE(');
  } else if (fromDb === 'postgresql') {
    if (toDb === 'oracle') b = b.replace(/\bCOALESCE\s*\(\s*([^,]+),\s*([^)]+)\)/gi, 'NVL($1, $2)');
    else if (toDb === 'mysql') b = b.replace(/\bCOALESCE\s*\(\s*([^,]+),\s*([^)]+)\)/gi, 'IFNULL($1, $2)');
  }

  // TO_NUMBER / CAST / ::INTEGER
  if (fromDb === 'oracle') {
    if (toDb === 'mysql') b = b.replace(/\bTO_NUMBER\s*\(\s*([^)]+)\s*\)/gi, 'CAST($1 AS SIGNED)');
    else if (toDb === 'postgresql') b = b.replace(/\bTO_NUMBER\s*\(\s*([^)]+)\s*\)/gi, 'CAST($1 AS INTEGER)');
  } else if (fromDb === 'mysql') {
    if (toDb === 'oracle') b = b.replace(/\bCAST\s*\(\s*([^)]+?)\s+AS\s+SIGNED\s*\)/gi, 'TO_NUMBER($1)');
    else if (toDb === 'postgresql') b = b.replace(/\bCAST\s*\(\s*([^)]+?)\s+AS\s+SIGNED\s*\)/gi, 'CAST($1 AS INTEGER)');
  } else if (fromDb === 'postgresql') {
    b = b.replace(/(\w+)::INTEGER/gi, function(m, v) {
      if (toDb === 'oracle') return 'TO_NUMBER(' + v + ')';
      return 'CAST(' + v + ' AS SIGNED)';
    });
  }

  // SYSDATE / SYSTIMESTAMP / NOW() / CURRENT_DATE / CLOCK_TIMESTAMP()
  if (fromDb === 'oracle') {
    if (toDb === 'mysql') {
      b = b.replace(/\bSYSTIMESTAMP\b/gi, 'NOW()');
      b = b.replace(/\bSYSDATE\b/gi, 'NOW()');
    } else if (toDb === 'postgresql') {
      b = b.replace(/\bSYSTIMESTAMP\b/gi, 'CLOCK_TIMESTAMP()');
      b = b.replace(/\bSYSDATE\b/gi, 'CURRENT_DATE');
    }
  } else if (fromDb === 'mysql') {
    if (toDb === 'oracle') {
      b = b.replace(/\bNOW\s*\(\s*\)/gi, 'SYSDATE');
      b = b.replace(/\bCURRENT_DATE\b(?!\s*\()/gi, 'SYSDATE');
    } else if (toDb === 'postgresql') {
      b = b.replace(/\bNOW\s*\(\s*\)/gi, 'CURRENT_DATE');
    }
  } else if (fromDb === 'postgresql') {
    if (toDb === 'oracle') {
      b = b.replace(/\bCLOCK_TIMESTAMP\s*\(\s*\)/gi, 'SYSTIMESTAMP');
      b = b.replace(/\bCURRENT_DATE\b/gi, 'SYSDATE');
      b = b.replace(/\bNOW\s*\(\s*\)/gi, 'SYSDATE');
    } else if (toDb === 'mysql') {
      b = b.replace(/\bCLOCK_TIMESTAMP\s*\(\s*\)/gi, 'NOW()');
      b = b.replace(/\bCURRENT_DATE\b/gi, 'NOW()');
    }
  }

  // TO_CHAR / DATE_FORMAT
  if (fromDb === 'oracle' && toDb === 'mysql') {
    b = b.replace(/\bTO_CHAR\s*\(\s*([^,]+),\s*'([^']+)'\s*\)/gi, "DATE_FORMAT($1, '$2')");
  } else if (fromDb === 'mysql' && toDb === 'oracle') {
    b = b.replace(/\bDATE_FORMAT\s*\(\s*([^,]+),\s*'([^']+)'\s*\)/gi, "TO_CHAR($1, '$2')");
  } else if (fromDb === 'mysql' && toDb === 'postgresql') {
    b = b.replace(/\bDATE_FORMAT\s*\(\s*([^,]+),\s*'([^']+)'\s*\)/gi, "TO_CHAR($1, '$2')");
  } else if (fromDb === 'postgresql' && toDb === 'mysql') {
    b = b.replace(/\bTO_CHAR\s*\(\s*([^,]+),\s*'([^']+)'\s*\)/gi, "DATE_FORMAT($1, '$2')");
  }

  // TO_DATE / STR_TO_DATE
  if (fromDb === 'oracle' && toDb === 'mysql') {
    b = b.replace(/\bTO_DATE\s*\(\s*([^,]+),\s*'([^']+)'\s*\)/gi, "STR_TO_DATE($1, '$2')");
  } else if (fromDb === 'mysql') {
    if (toDb === 'oracle') b = b.replace(/\bSTR_TO_DATE\s*\(\s*([^,]+),\s*'([^']+)'\s*\)/gi, "TO_DATE($1, '$2')");
    else if (toDb === 'postgresql') b = b.replace(/\bSTR_TO_DATE\s*\(\s*([^,]+),\s*'([^']+)'\s*\)/gi, "TO_DATE($1, '$2')");
  } else if (fromDb === 'postgresql' && toDb === 'mysql') {
    b = b.replace(/\bTO_DATE\s*\(\s*([^,]+),\s*'([^']+)'\s*\)/gi, "STR_TO_DATE($1, '$2')");
  }

  // SUBSTR / SUBSTRING
  if (fromDb === 'postgresql' && (toDb === 'oracle' || toDb === 'mysql')) {
    b = b.replace(/\bSUBSTRING\s*\(\s*([^,]+?)\s+FROM\s+(\S+)\s+FOR\s+(\S+)\s*\)/gi, 'SUBSTR($1, $2, $3)');
  } else if ((fromDb === 'oracle' || fromDb === 'mysql') && toDb === 'postgresql') {
    b = b.replace(/\bSUBSTR\s*\(\s*([^,]+),\s*([^,]+),\s*([^)]+)\)/gi, 'SUBSTRING($1 FROM $2 FOR $3)');
  }

  // String concatenation: || vs CONCAT
  if (fromDb === 'mysql' && (toDb === 'oracle' || toDb === 'postgresql')) {
    var prev = '';
    while (prev !== b) {
      prev = b;
      b = b.replace(/\bCONCAT\s*\(\s*([^,()]+(?:\([^()]*\)[^,()]*)*)\s*,\s*([^,()]+(?:\([^()]*\)[^,()]*)*)\s*\)/gi, '($1 || $2)');
    }
  } else if ((fromDb === 'oracle' || fromDb === 'postgresql') && toDb === 'mysql') {
    var lines = b.split('\n');
    for (var li = 0; li < lines.length; li++) {
      if (lines[li].includes('||') && !lines[li].match(/^\s*--/)) {
        lines[li] = _convertConcatToFunction(lines[li]);
      }
    }
    b = lines.join('\n');
  }

  // DBMS_OUTPUT.PUT_LINE / SELECT / RAISE NOTICE
  if (fromDb === 'oracle') {
    if (toDb === 'mysql') {
      b = b.replace(/\bDBMS_OUTPUT\.PUT_LINE\s*\(\s*([^;]+)\)\s*;/gi, 'SELECT $1;');
    } else if (toDb === 'postgresql') {
      b = b.replace(/\bDBMS_OUTPUT\.PUT_LINE\s*\(\s*([^;]+)\)\s*;/gi, "RAISE NOTICE '%', $1;");
    }
  } else if (fromDb === 'mysql') {
    if (toDb === 'oracle') {
      b = b.replace(/\bSELECT\s+(.+?)\s*;\s*(?=\n|$)/gi, function(m, expr) {
        if (/\b(INTO|FROM|WHERE)\b/i.test(expr)) return m;
        return 'DBMS_OUTPUT.PUT_LINE(' + expr.trim() + ');';
      });
    } else if (toDb === 'postgresql') {
      b = b.replace(/\bSELECT\s+(.+?)\s*;\s*(?=\n|$)/gi, function(m, expr) {
        if (/\b(INTO|FROM|WHERE)\b/i.test(expr)) return m;
        return "RAISE NOTICE '%', " + expr.trim() + ';';
      });
    }
  } else if (fromDb === 'postgresql') {
    if (toDb === 'oracle') {
      b = b.replace(/\bRAISE\s+NOTICE\s+'[^']*',\s*([^;]+);/gi, 'DBMS_OUTPUT.PUT_LINE($1);');
    } else if (toDb === 'mysql') {
      b = b.replace(/\bRAISE\s+NOTICE\s+'[^']*',\s*([^;]+);/gi, 'SELECT $1;');
    }
  }

  // EXCEPTION handling
  if (fromDb === 'oracle') {
    if (toDb === 'mysql') {
      b = b.replace(/\bEXCEPTION\s+WHEN\s+NO_DATA_FOUND\s+THEN\b/gi,
        '-- [注意: Oracle EXCEPTION 已转换; MySQL 请使用 DECLARE HANDLER]\n  -- DECLARE CONTINUE HANDLER FOR NOT FOUND');
      b = b.replace(/\bEXCEPTION\s+WHEN\s+OTHERS\s+THEN\b/gi,
        '-- [注意: Oracle EXCEPTION 已转换]\n  -- DECLARE EXIT HANDLER FOR SQLEXCEPTION BEGIN\n  --');
    }
  } else if (fromDb === 'mysql') {
    if (toDb === 'oracle') {
      b = b.replace(/\bDECLARE\s+(EXIT|CONTINUE)\s+HANDLER\s+FOR\s+SQLEXCEPTION\b/gi,
        '-- [注意: MySQL HANDLER -> Oracle 请使用 EXCEPTION WHEN OTHERS THEN]');
      b = b.replace(/\bDECLARE\s+(EXIT|CONTINUE)\s+HANDLER\s+FOR\s+NOT\s+FOUND\b/gi,
        '-- [注意: MySQL HANDLER -> Oracle 请使用 EXCEPTION WHEN NO_DATA_FOUND THEN]');
    } else if (toDb === 'postgresql') {
      b = b.replace(/\bDECLARE\s+(EXIT|CONTINUE)\s+HANDLER\s+FOR\s+SQLEXCEPTION\b/gi,
        '-- [注意: MySQL HANDLER -> PG 请使用 EXCEPTION WHEN OTHERS THEN]');
      b = b.replace(/\bDECLARE\s+(EXIT|CONTINUE)\s+HANDLER\s+FOR\s+NOT\s+FOUND\b/gi,
        '-- [注意: MySQL HANDLER -> PG 请使用 EXCEPTION WHEN NO_DATA_FOUND THEN]');
    }
  } else if (fromDb === 'postgresql') {
    if (toDb === 'mysql') {
      b = b.replace(/\bEXCEPTION\s+WHEN\s+NO_DATA_FOUND\s+THEN\b/gi,
        '-- [注意: PG EXCEPTION -> MySQL 请使用 DECLARE HANDLER]');
      b = b.replace(/\bEXCEPTION\s+WHEN\s+OTHERS\s+THEN\b/gi,
        '-- [注意: PG EXCEPTION -> MySQL 请使用 DECLARE EXIT HANDLER FOR SQLEXCEPTION]');
    }
  }

  // ROWNUM -> LIMIT
  if (fromDb === 'oracle' && (toDb === 'mysql' || toDb === 'postgresql')) {
    b = b.replace(/\bWHERE\s+ROWNUM\s*<=?\s*(\d+)/gi, 'LIMIT $1');
    b = b.replace(/\bAND\s+ROWNUM\s*<=?\s*(\d+)/gi, '\n  LIMIT $1');
  }

  // Type names inside body
  if (fromDb === 'oracle' && (toDb === 'mysql' || toDb === 'postgresql')) {
    b = b.replace(/\bVARCHAR2\b/gi, 'VARCHAR');
  }

  return b;
}

/* --- Parameter parsers --- */

function _parseOracleParam(paramStr) {
  var s = paramStr.trim();
  if (!s) return null;
  var m = s.match(/^(\w+)\s+(IN\s+OUT|IN|OUT)\s+(.+?)(?:\s+DEFAULT\s+(.+))?$/i);
  if (m) {
    return { name: m[1], direction: m[2].replace(/\s+/g, ' ').toUpperCase(), type: m[3].trim(), defaultVal: m[4] || null };
  }
  var m2 = s.match(/^(\w+)\s+(.+?)(?:\s+DEFAULT\s+(.+))?$/i);
  if (!m2) return null;
  return { name: m2[1], direction: 'IN', type: m2[2].trim(), defaultVal: m2[3] || null };
}

function _parseMySQLParam(paramStr) {
  var s = paramStr.trim();
  if (!s) return null;
  var m = s.match(/^(IN\s*OUT|INOUT|IN|OUT)\s+(\w+)\s+(.+?)(?:\s+DEFAULT\s+(.+))?$/i);
  if (m) {
    var dir = m[1].toUpperCase().replace(/\s+/g, ' ');
    if (dir === 'INOUT') dir = 'IN OUT';
    return { name: m[2], direction: dir, type: m[3].trim(), defaultVal: m[4] || null };
  }
  var m2 = s.match(/^(\w+)\s+(.+?)(?:\s+DEFAULT\s+(.+))?$/i);
  if (!m2) return null;
  return { name: m2[1], direction: 'IN', type: m2[2].trim(), defaultVal: m2[3] || null };
}

function _parsePGParam(paramStr) {
  var s = paramStr.trim();
  if (!s) return null;
  var m = s.match(/^(\w+)\s+(IN\s*OUT|INOUT|IN|OUT)\s+(.+?)(?:\s+DEFAULT\s+(.+))?$/i);
  if (m) {
    var dir = m[2].toUpperCase().replace(/\s+/g, ' ');
    if (dir === 'INOUT') dir = 'IN OUT';
    return { name: m[1], direction: dir, type: m[3].trim(), defaultVal: m[4] || null };
  }
  var m2 = s.match(/^(\w+)\s+(.+?)(?:\s+DEFAULT\s+(.+))?$/i);
  if (!m2) return null;
  return { name: m2[1], direction: 'IN', type: m2[2].trim(), defaultVal: m2[3] || null };
}

function _parseOracleVarDecl(declBlock) {
  var vars = [];
  if (!declBlock) return vars;
  var parts = declBlock.split(';');
  for (var i = 0; i < parts.length; i++) {
    var s = parts[i].trim();
    if (!s) continue;
    if (/^--/.test(s)) { vars.push({ raw: s + ';' }); continue; }
    var m = s.match(/^(\w+)\s+(.+?)(?:\s*:=\s*(.+))?$/i);
    if (m) {
      vars.push({ name: m[1], type: m[2].trim(), defaultVal: m[3] ? m[3].trim() : null });
    } else {
      vars.push({ raw: s + ';' });
    }
  }
  return vars;
}

/* ===== FUNCTION TRANSLATION ENGINE ===== */

function convertFunction(input, sourceDb, targetDb) {
  if (!input || !input.trim()) return '-- 请在左侧输入区粘贴源函数定义';
  if (sourceDb === targetDb) return '-- 源库与目标库相同 (' + DB_LABELS[sourceDb] + ')，无需翻译\n\n' + input.trim();

  var blocks = input.split(/(?=\bCREATE\b)/i).filter(function(b) { return b.trim().length > 0; });
  var results = [];
  var errCount = 0;

  for (var i = 0; i < blocks.length; i++) {
    try {
      results.push(_convertSingleFunction(blocks[i].trim(), sourceDb, targetDb));
    } catch (e) {
      errCount++;
      results.push('-- 翻译失败: ' + e.message + '\n-- 原始代码:\n' + blocks[i].trim());
    }
  }

  var header = '-- 函数翻译: ' + DB_LABELS[sourceDb] + ' \u2192 ' + DB_LABELS[targetDb] +
    ' | 共 ' + results.length + ' 个函数' +
    (errCount > 0 ? ' (' + errCount + ' 个失败)' : '') +
    ' | ' + new Date().toLocaleString('zh-CN') + '\n';

  return header + '\n' + results.join('\n\n');
}

function _convertSingleFunction(input, sourceDb, targetDb) {
  var parsed;
  if (sourceDb === 'oracle') parsed = _parseOracleFunction(input);
  else if (sourceDb === 'mysql') parsed = _parseMySQLFunction(input);
  else parsed = _parsePGFunction(input);

  if (!parsed) throw new Error('无法解析函数定义，请检查语法');

  var mappedParams = parsed.params.map(function(p) {
    return { name: p.name, direction: p.direction, type: mapParamType(p.type, sourceDb, targetDb), defaultVal: p.defaultVal };
  });
  var mappedReturnType = mapParamType(parsed.returnType, sourceDb, targetDb);
  var transformedBody = transformBody(parsed.body, sourceDb, targetDb);
  var mappedVars = parsed.vars.map(function(v) {
    if (v.raw) return v;
    return { name: v.name, type: mapParamType(v.type, sourceDb, targetDb), defaultVal: v.defaultVal };
  });

  if (targetDb === 'oracle') return _genOracleFunction(parsed.name, mappedParams, mappedReturnType, mappedVars, transformedBody);
  if (targetDb === 'mysql') return _genMySQLFunction(parsed.name, mappedParams, mappedReturnType, mappedVars, transformedBody);
  return _genPGFunction(parsed.name, mappedParams, mappedReturnType, mappedVars, transformedBody);
}

/* --- Function parsers --- */

function _parseOracleFunction(input) {
  var src = input.replace(/\n\s*\/\s*$/, '').trim();
  var headerRe = /CREATE\s+(?:OR\s+REPLACE\s+)?FUNCTION\s+(\w+)\s*\(([^)]*)\)\s*RETURN\s+(\S+(?:\s*\([^)]*\))?)\s+(IS|AS)\b/i;
  var m = src.match(headerRe);
  if (!m) throw new Error('无法解析Oracle函数头');
  var name = m[1], paramStr = m[2], returnType = m[3];
  var afterHeader = src.substring(m.index + m[0].length);
  var beginIdx = afterHeader.search(/\bBEGIN\b/i);
  var declBlock = '', bodyPart = afterHeader;
  if (beginIdx >= 0) { declBlock = afterHeader.substring(0, beginIdx).trim(); bodyPart = afterHeader.substring(beginIdx); }
  var params = _splitParamList(paramStr).map(_parseOracleParam).filter(Boolean);
  var vars = _parseOracleVarDecl(declBlock);
  var bodyMatch = bodyPart.match(/\bBEGIN\b([\s\S]*)\bEND\b\s*\w*\s*;?\s*$/i);
  var body = bodyMatch ? bodyMatch[1] : bodyPart;
  return { name: name, params: params, returnType: returnType, vars: vars, body: body };
}

function _parseMySQLFunction(input) {
  var src = input.replace(/^\s*DELIMITER\s+\S+\s*$/gm, '').trim();
  src = src.replace(/\$\$\s*$/g, '').trim();
  var headerRe = /CREATE\s+(?:DEFINER\s*=\s*\S+\s+)?FUNCTION\s+(\w+)\s*\(([^)]*)\)\s*RETURNS\s+(\S+(?:\s*\([^)]*\))?)\s*(?:DETERMINISTIC\s*)?(?:READS\s+SQL\s+DATA\s*)?/i;
  var m = src.match(headerRe);
  if (!m) throw new Error('无法解析MySQL函数头');
  var name = m[1], paramStr = m[2], returnType = m[3];
  var afterHeader = src.substring(m.index + m[0].length);
  var bodyMatch = afterHeader.match(/\bBEGIN\b([\s\S]*)\bEND\b\s*;?\s*$/i);
  if (!bodyMatch) throw new Error('无法找到MySQL函数体 BEGIN...END');
  var bodyContent = bodyMatch[1];
  var vars = [], bodyLines = bodyContent.split('\n'), nonDeclLines = [];
  for (var i = 0; i < bodyLines.length; i++) {
    var declMatch = bodyLines[i].match(/^\s*DECLARE\s+(\w+)\s+(.+?)(?:\s+DEFAULT\s+(.+?))?\s*;\s*$/i);
    if (declMatch) {
      vars.push({ name: declMatch[1], type: declMatch[2].trim(), defaultVal: declMatch[3] ? declMatch[3].trim() : null });
    } else { nonDeclLines.push(bodyLines[i]); }
  }
  var params = _splitParamList(paramStr).map(_parseMySQLParam).filter(Boolean);
  return { name: name, params: params, returnType: returnType, vars: vars, body: nonDeclLines.join('\n') };
}

function _parsePGFunction(input) {
  var src = input.trim();
  var headerRe = /CREATE\s+(?:OR\s+REPLACE\s+)?FUNCTION\s+(\w+)\s*\(([^)]*)\)\s*RETURNS\s+(\S+(?:\s*\([^)]*\))?)\s*(?:AS\s*\$\$|LANGUAGE\s+\w+\s*AS\s*\$\$)/i;
  var m = src.match(headerRe);
  if (!m) throw new Error('无法解析PostgreSQL函数头');
  var name = m[1], paramStr = m[2], returnType = m[3];
  var afterHeader = src.substring(m.index + m[0].length);
  var inner = afterHeader.replace(/\$\$\s*;?\s*$/g, '').replace(/\bLANGUAGE\s+\w+\s*;?\s*$/gi, '').trim();
  inner = inner.replace(/\$\$\s*LANGUAGE\s+\w+\s*;?\s*$/gi, '').trim();
  var vars = [];
  var declareMatch = inner.match(/\bDECLARE\b([\s\S]*?)\bBEGIN\b/i);
  if (declareMatch) {
    var declParts = declareMatch[1].split(';');
    for (var i = 0; i < declParts.length; i++) {
      var s = declParts[i].trim();
      if (!s) continue;
      var vm = s.match(/^(\w+)\s+(.+?)(?:\s*:=\s*(.+))?$/i);
      if (vm) vars.push({ name: vm[1], type: vm[2].trim(), defaultVal: vm[3] ? vm[3].trim() : null });
    }
  }
  var bodyMatch = inner.match(/\bBEGIN\b([\s\S]*)\bEND\b\s*;?\s*$/i);
  var body = bodyMatch ? bodyMatch[1] : inner;
  var params = _splitParamList(paramStr).map(_parsePGParam).filter(Boolean);
  return { name: name, params: params, returnType: returnType, vars: vars, body: body };
}

/* --- Function generators --- */

function _genOracleFunction(name, params, returnType, vars, body) {
  var out = 'CREATE OR REPLACE FUNCTION ' + name + '(\n';
  var pLines = params.map(function(p) {
    var line = '  ' + p.name;
    line += ' ' + (p.direction || 'IN');
    line += ' ' + p.type;
    if (p.defaultVal) line += ' DEFAULT ' + p.defaultVal;
    return line;
  });
  out += pLines.join(',\n') + ')\nRETURN ' + returnType + '\nIS\n';
  for (var i = 0; i < vars.length; i++) {
    var v = vars[i];
    if (v.raw) { out += '  ' + v.raw + '\n'; continue; }
    out += '  ' + v.name + ' ' + v.type;
    if (v.defaultVal) out += ' := ' + v.defaultVal;
    out += ';\n';
  }
  out += 'BEGIN' + body;
  if (!/\bEND\s*;?\s*$/i.test(out.trim())) out += '\nEND;\n';
  if (!out.trimEnd().match(/END\s*;\s*$/i)) out = out.trimEnd() + ';\n';
  out += '/';
  return out;
}

function _genMySQLFunction(name, params, returnType, vars, body) {
  var out = 'DELIMITER $$\nCREATE FUNCTION ' + name + '(\n';
  var filteredParams = [], hasOutNote = false;
  for (var i = 0; i < params.length; i++) {
    if (params[i].direction === 'OUT' || params[i].direction === 'IN OUT') { hasOutNote = true; continue; }
    filteredParams.push(params[i]);
  }
  var pLines = filteredParams.map(function(p) { return '  ' + p.name + ' ' + p.type; });
  out += pLines.join(',\n') + ')\nRETURNS ' + returnType + '\nDETERMINISTIC\nBEGIN\n';
  if (hasOutNote) out += '  -- 注意: MySQL函数不支持OUT参数，已移除OUT/IN OUT参数\n';
  for (var j = 0; j < vars.length; j++) {
    var v = vars[j];
    if (v.raw) { out += '  ' + v.raw + '\n'; continue; }
    out += '  DECLARE ' + v.name + ' ' + v.type;
    if (v.defaultVal) out += ' DEFAULT ' + v.defaultVal;
    out += ';\n';
  }
  out += body;
  // Ensure proper END
  var afterBegin = out.substring(out.lastIndexOf('BEGIN'));
  if (!/\bEND\b/i.test(afterBegin.split('BEGIN').pop())) out += '\nEND';
  out = out.replace(/\bEND\s*;?\s*$/, 'END$$');
  if (!out.trimEnd().endsWith('$$')) out = out.trimEnd() + '$$';
  out += '\nDELIMITER ;';
  return out;
}

function _genPGFunction(name, params, returnType, vars, body) {
  var out = 'CREATE OR REPLACE FUNCTION ' + name + '(\n';
  var pLines = params.map(function(p) {
    var line = '  ' + p.name;
    if (p.direction) line += ' ' + p.direction;
    line += ' ' + p.type;
    if (p.defaultVal) line += ' DEFAULT ' + p.defaultVal;
    return line;
  });
  out += pLines.join(',\n') + ')\nRETURNS ' + returnType + '\nLANGUAGE plpgsql\nAS $$\n';
  if (vars.length > 0) {
    out += 'DECLARE\n';
    for (var i = 0; i < vars.length; i++) {
      var v = vars[i];
      if (v.raw) { out += '  ' + v.raw + '\n'; continue; }
      out += '  ' + v.name + ' ' + v.type;
      if (v.defaultVal) out += ' := ' + v.defaultVal;
      out += ';\n';
    }
  }
  out += 'BEGIN' + body;
  if (!/\bEND\s*;?\s*$/i.test(out.trim())) out += '\nEND;\n';
  out = out.replace(/END\s*;?\s*$/, 'END;\n$$;');
  return out;
}

/* ===== STORED PROCEDURE TRANSLATION ENGINE ===== */

function convertProcedure(input, sourceDb, targetDb) {
  if (!input || !input.trim()) return '-- 请在左侧输入区粘贴源存储过程定义';
  if (sourceDb === targetDb) return '-- 源库与目标库相同 (' + DB_LABELS[sourceDb] + ')，无需翻译\n\n' + input.trim();

  var blocks = input.split(/(?=\bCREATE\b)/i).filter(function(b) { return b.trim().length > 0; });
  var results = [];
  var errCount = 0;

  for (var i = 0; i < blocks.length; i++) {
    try {
      results.push(_convertSingleProcedure(blocks[i].trim(), sourceDb, targetDb));
    } catch (e) {
      errCount++;
      results.push('-- 翻译失败: ' + e.message + '\n-- 原始代码:\n' + blocks[i].trim());
    }
  }

  var header = '-- 存储过程翻译: ' + DB_LABELS[sourceDb] + ' \u2192 ' + DB_LABELS[targetDb] +
    ' | 共 ' + results.length + ' 个存储过程' +
    (errCount > 0 ? ' (' + errCount + ' 个失败)' : '') +
    ' | ' + new Date().toLocaleString('zh-CN') + '\n';

  return header + '\n' + results.join('\n\n');
}

function _convertSingleProcedure(input, sourceDb, targetDb) {
  var parsed;
  if (sourceDb === 'oracle') parsed = _parseOracleProcedure(input);
  else if (sourceDb === 'mysql') parsed = _parseMySQLProcedure(input);
  else parsed = _parsePGProcedure(input);

  if (!parsed) throw new Error('无法解析存储过程定义，请检查语法');

  var mappedParams = parsed.params.map(function(p) {
    return { name: p.name, direction: p.direction, type: mapParamType(p.type, sourceDb, targetDb), defaultVal: p.defaultVal };
  });
  var transformedBody = transformBody(parsed.body, sourceDb, targetDb);
  var mappedVars = parsed.vars.map(function(v) {
    if (v.raw) return v;
    return { name: v.name, type: mapParamType(v.type, sourceDb, targetDb), defaultVal: v.defaultVal };
  });

  if (targetDb === 'oracle') return _genOracleProcedure(parsed.name, mappedParams, mappedVars, transformedBody);
  if (targetDb === 'mysql') return _genMySQLProcedure(parsed.name, mappedParams, mappedVars, transformedBody);
  return _genPGProcedure(parsed.name, mappedParams, mappedVars, transformedBody);
}

/* --- Procedure parsers --- */

function _parseOracleProcedure(input) {
  var src = input.replace(/\n\s*\/\s*$/, '').trim();
  var headerRe = /CREATE\s+(?:OR\s+REPLACE\s+)?PROCEDURE\s+(\w+)\s*\(([^)]*)\)\s*(IS|AS)\b/i;
  var m = src.match(headerRe);
  if (!m) {
    // Try without params
    var headerRe2 = /CREATE\s+(?:OR\s+REPLACE\s+)?PROCEDURE\s+(\w+)\s*(IS|AS)\b/i;
    m = src.match(headerRe2);
    if (!m) throw new Error('无法解析Oracle存储过程头');
    var name = m[1];
    var afterHeader = src.substring(m.index + m[0].length);
    var beginIdx = afterHeader.search(/\bBEGIN\b/i);
    var declBlock = '', bodyPart = afterHeader;
    if (beginIdx >= 0) { declBlock = afterHeader.substring(0, beginIdx).trim(); bodyPart = afterHeader.substring(beginIdx); }
    var vars = _parseOracleVarDecl(declBlock);
    var bodyMatch = bodyPart.match(/\bBEGIN\b([\s\S]*)\bEND\b\s*\w*\s*;?\s*$/i);
    var body = bodyMatch ? bodyMatch[1] : bodyPart;
    return { name: name, params: [], vars: vars, body: body };
  }
  var name = m[1], paramStr = m[2];
  var afterHeader = src.substring(m.index + m[0].length);
  var beginIdx = afterHeader.search(/\bBEGIN\b/i);
  var declBlock = '', bodyPart = afterHeader;
  if (beginIdx >= 0) { declBlock = afterHeader.substring(0, beginIdx).trim(); bodyPart = afterHeader.substring(beginIdx); }
  var params = _splitParamList(paramStr).map(_parseOracleParam).filter(Boolean);
  var vars = _parseOracleVarDecl(declBlock);
  var bodyMatch = bodyPart.match(/\bBEGIN\b([\s\S]*)\bEND\b\s*\w*\s*;?\s*$/i);
  var body = bodyMatch ? bodyMatch[1] : bodyPart;
  return { name: name, params: params, vars: vars, body: body };
}

function _parseMySQLProcedure(input) {
  var src = input.replace(/^\s*DELIMITER\s+\S+\s*$/gm, '').trim();
  src = src.replace(/\$\$\s*$/g, '').trim();
  var headerRe = /CREATE\s+(?:DEFINER\s*=\s*\S+\s+)?PROCEDURE\s+(\w+)\s*\(([^)]*)\)/i;
  var m = src.match(headerRe);
  if (!m) throw new Error('无法解析MySQL存储过程头');
  var name = m[1], paramStr = m[2];
  var afterHeader = src.substring(m.index + m[0].length);
  var bodyMatch = afterHeader.match(/\bBEGIN\b([\s\S]*)\bEND\b\s*;?\s*$/i);
  if (!bodyMatch) throw new Error('无法找到MySQL存储过程体 BEGIN...END');
  var bodyContent = bodyMatch[1];
  var vars = [], bodyLines = bodyContent.split('\n'), nonDeclLines = [];
  for (var i = 0; i < bodyLines.length; i++) {
    var declMatch = bodyLines[i].match(/^\s*DECLARE\s+(\w+)\s+(.+?)(?:\s+DEFAULT\s+(.+?))?\s*;\s*$/i);
    if (declMatch) {
      vars.push({ name: declMatch[1], type: declMatch[2].trim(), defaultVal: declMatch[3] ? declMatch[3].trim() : null });
    } else { nonDeclLines.push(bodyLines[i]); }
  }
  var params = _splitParamList(paramStr).map(_parseMySQLParam).filter(Boolean);
  return { name: name, params: params, vars: vars, body: nonDeclLines.join('\n') };
}

function _parsePGProcedure(input) {
  var src = input.trim();
  var headerRe = /CREATE\s+(?:OR\s+REPLACE\s+)?PROCEDURE\s+(\w+)\s*\(([^)]*)\)\s*(?:LANGUAGE\s+\w+\s*)?(?:AS\s*\$\$)/i;
  var m = src.match(headerRe);
  if (!m) {
    // Try with LANGUAGE after AS $$
    var headerRe2 = /CREATE\s+(?:OR\s+REPLACE\s+)?PROCEDURE\s+(\w+)\s*\(([^)]*)\)\s*AS\s*\$\$/i;
    m = src.match(headerRe2);
    if (!m) throw new Error('无法解析PostgreSQL存储过程头');
  }
  var name = m[1], paramStr = m[2];
  var afterHeader = src.substring(m.index + m[0].length);
  var inner = afterHeader.replace(/\$\$\s*;?\s*$/g, '').replace(/\bLANGUAGE\s+\w+\s*;?\s*$/gi, '').trim();
  inner = inner.replace(/\$\$\s*LANGUAGE\s+\w+\s*;?\s*$/gi, '').trim();
  var vars = [];
  var declareMatch = inner.match(/\bDECLARE\b([\s\S]*?)\bBEGIN\b/i);
  if (declareMatch) {
    var declParts = declareMatch[1].split(';');
    for (var i = 0; i < declParts.length; i++) {
      var s = declParts[i].trim();
      if (!s) continue;
      var vm = s.match(/^(\w+)\s+(.+?)(?:\s*:=\s*(.+))?$/i);
      if (vm) vars.push({ name: vm[1], type: vm[2].trim(), defaultVal: vm[3] ? vm[3].trim() : null });
    }
  }
  var bodyMatch = inner.match(/\bBEGIN\b([\s\S]*)\bEND\b\s*;?\s*$/i);
  var body = bodyMatch ? bodyMatch[1] : inner;
  var params = _splitParamList(paramStr).map(_parsePGParam).filter(Boolean);
  return { name: name, params: params, vars: vars, body: body };
}

/* --- Procedure generators --- */

function _genOracleProcedure(name, params, vars, body) {
  var out = 'CREATE OR REPLACE PROCEDURE ' + name;
  if (params.length > 0) {
    out += '(\n';
    var pLines = params.map(function(p) {
      var line = '  ' + p.name;
      line += ' ' + (p.direction || 'IN');
      line += ' ' + p.type;
      if (p.defaultVal) line += ' DEFAULT ' + p.defaultVal;
      return line;
    });
    out += pLines.join(',\n') + ')\n';
  } else {
    out += '\n';
  }
  out += 'IS\n';
  for (var i = 0; i < vars.length; i++) {
    var v = vars[i];
    if (v.raw) { out += '  ' + v.raw + '\n'; continue; }
    out += '  ' + v.name + ' ' + v.type;
    if (v.defaultVal) out += ' := ' + v.defaultVal;
    out += ';\n';
  }
  out += 'BEGIN' + body;
  if (!/\bEND\s*;?\s*$/i.test(out.trim())) out += '\nEND;\n';
  if (!out.trimEnd().match(/END\s*;\s*$/i)) out = out.trimEnd() + ';\n';
  out += '/';
  return out;
}

function _genMySQLProcedure(name, params, vars, body) {
  var out = 'DELIMITER $$\nCREATE PROCEDURE ' + name + '(\n';
  var pLines = params.map(function(p) {
    var dir = p.direction || 'IN';
    if (dir === 'IN OUT') dir = 'INOUT';
    return '  ' + dir + ' ' + p.name + ' ' + p.type;
  });
  out += pLines.join(',\n') + ')\nBEGIN\n';
  for (var i = 0; i < vars.length; i++) {
    var v = vars[i];
    if (v.raw) { out += '  ' + v.raw + '\n'; continue; }
    out += '  DECLARE ' + v.name + ' ' + v.type;
    if (v.defaultVal) out += ' DEFAULT ' + v.defaultVal;
    out += ';\n';
  }
  out += body;
  var afterBegin = out.substring(out.lastIndexOf('BEGIN'));
  if (!/\bEND\b/i.test(afterBegin.split('BEGIN').pop())) out += '\nEND';
  out = out.replace(/\bEND\s*;?\s*$/, 'END$$');
  if (!out.trimEnd().endsWith('$$')) out = out.trimEnd() + '$$';
  out += '\nDELIMITER ;';
  return out;
}

function _genPGProcedure(name, params, vars, body) {
  var out = 'CREATE OR REPLACE PROCEDURE ' + name + '(\n';
  var pLines = params.map(function(p) {
    var line = '  ' + p.name;
    if (p.direction) line += ' ' + p.direction;
    line += ' ' + p.type;
    if (p.defaultVal) line += ' DEFAULT ' + p.defaultVal;
    return line;
  });
  out += pLines.join(',\n') + ')\nLANGUAGE plpgsql\nAS $$\n';
  if (vars.length > 0) {
    out += 'DECLARE\n';
    for (var i = 0; i < vars.length; i++) {
      var v = vars[i];
      if (v.raw) { out += '  ' + v.raw + '\n'; continue; }
      out += '  ' + v.name + ' ' + v.type;
      if (v.defaultVal) out += ' := ' + v.defaultVal;
      out += ';\n';
    }
  }
  out += 'BEGIN' + body;
  if (!/\bEND\s*;?\s*$/i.test(out.trim())) out += '\nEND;\n';
  out = out.replace(/END\s*;?\s*$/, 'END;\n$$;');
  return out;
}

    // ========== Scroll to top ==========
    const showScrollTop = ref(false);
    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    // ========== Lifecycle ==========
    let scrollHandler;
    let keyHandler;
    onMounted(() => {
      scrollHandler = () => { showScrollTop.value = window.scrollY > 300; };
      window.addEventListener('scroll', scrollHandler, { passive: true });
      keyHandler = (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          if (activePage.value === 'func') convertFunc();
          else if (activePage.value === 'proc') convertProc();
          else convert();
        }
      };
      window.addEventListener('keydown', keyHandler);
    });
    onUnmounted(() => {
      if (scrollHandler) window.removeEventListener('scroll', scrollHandler);
      if (keyHandler) window.removeEventListener('keydown', keyHandler);
    });

    return {
      activePage,
      // DDL
      sourceDb, targetDb, inputDdl, outputDdl,
      sourceLabel, targetLabel, inputLineCount, outputMeta,
      swapDbs, loadSample, clearAll, convert, copyOutput, saveOutput,
      // Function
      funcSourceDb, funcTargetDb, funcInput, funcOutput,
      funcSourceLabel, funcTargetLabel, funcInputLineCount, funcOutputMeta,
      swapFuncDbs, loadFuncSample, clearFunc, convertFunc, copyFuncOutput, saveFuncOutput,
      // Procedure
      procSourceDb, procTargetDb, procInput, procOutput,
      procSourceLabel, procTargetLabel, procInputLineCount, procOutputMeta,
      swapProcDbs, loadProcSample, clearProc, convertProc, copyProcOutput, saveProcOutput,
      // Shared
      statusText, fileInput, uploadFile, handleFileUpload,
      showScrollTop, scrollToTop
    };
  }
});
app.mount('#app');
</script>
</body>
</html>
